<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog and Cat Chase Animation</title>

    <style>

        /* BODY */
        body {
            margin: 0;
            overflow: hidden;
            height: 100vh;
            background: linear-gradient(to top, #87ceeb 70%, #4CAF50 30%);
            position: relative;
        }

        /* SUN */
        .sun {
            position: absolute;
            top: 40px;
            right: 80px;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, yellow 40%, orange);
            border-radius: 50%;
            animation: sunGlow 2s ease-in-out infinite alternate;
        }

        /* CAT */
        .cat {
            position: absolute;
            bottom: 80px;
            left: -120px;
            font-size: 70px;
            animation: runCat 6s linear infinite, bounce 0.5s ease-in-out infinite alternate;
        }

        /* DOG */
        .dog {
            position: absolute;
            bottom: 80px;
            left: -250px;
            font-size: 80px;
            animation: runDog 6s linear infinite, bounce 0.5s ease-in-out infinite alternate;
        }
        /* GIRL CONTAINER */
        .girl {
            position: absolute;
            bottom: 80px;
            right: 200px;
            width: 80px;
            height: 200px;
        }

        /* HEAD */
        .head {
            width: 60px;
            height: 60px;
            background: #fdd5b1;
            border-radius: 50%;
            margin: auto;
            position: relative;
        }

        /* BODY */
        .body {
            width: 40px;
            height: 70px;
            background: pink;
            margin: auto;
            border-radius: 10px;
        }

        /* ARMS */
        .arm {
            width: 15px;
            height: 60px;
            background: #fdd5b1;
            position: absolute;
            top: 70px;
            border-radius: 10px;
        }

        .left-arm {
            left: -5px;
        }

        .right-arm {
            right: -5px;
            transform-origin: top;
            animation: wave 1s infinite ease-in-out;
        }

        /* LEGS */
        .leg {
            width: 15px;
            height: 60px;
            background: blue;
            position: absolute;
            bottom: 0;
            border-radius: 10px;
        }

        .left-leg {
            left: 20px;
        }

        .right-leg {
            right: 20px;
        }

        /* WAVE ANIMATION */
        @keyframes wave {
            0% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(40deg);
            }

            50% {
                transform: rotate(-20deg);
            }

            75% {
                transform: rotate(40deg);
            }

            100% {
                transform: rotate(0deg);
            }
        }
        /* CAT MOVEMENT */
        @keyframes runCat {
            0% {
                left: -120px;
            }

            100% {
                left: 110%;
            }
        }

        /* DOG MOVEMENT */
        @keyframes runDog {
            0% {
                left: -250px;
            }

            100% {
                left: 105%;
            }
        }

        /* BOUNCE EFFECT (running feel) */
        @keyframes bounce {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-10px);
            }
        }
        @keyframes sunGlow {
            0% {
                transform: scale(1);
                box-shadow: 0 0 20px yellow, 0 0 40px orange;
            }

            100% {
                transform: scale(1.2);
                box-shadow: 0 0 40px yellow, 0 0 80px orange;
            }
        }

        /* GROUND */
        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 80px;
            background: #2e8b57;
        }
    </style>
</head>

<body>

    <div class="sun"></div>
    <div class="girl">
        <div class="head"></div>
        <div class="body"></div>
        <div class="arm left-arm"></div>
        <div class="arm right-arm"></div>
        <div class="leg left-leg"></div>
        <div class="leg right-leg"></div>
    </div>

    <div class="cat">🐱</div>
    <div class="dog">🐶</div>

    <div class="ground"></div>

</body>
</html>
