<!DOCTYPE html>
<html>
<head>
    <title>Lithophane Order</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 40px;
            text-align: center;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        h2, h3 {
            margin-bottom: 20px;
        }

        /* Glass Card */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 25px;
            margin: 15px;
            display: inline-block;
            border-radius: 15px;
            cursor: pointer;
            width: 180px;
            transition: 0.4s ease;
            position: relative;
            border: 2px solid transparent;
        }

            .card:hover:not(.disabled) {
                transform: translateY(-8px) scale(1.05);
                box-shadow: 0 15px 25px rgba(0,0,0,0.3);
            }

        .selected {
            border: 2px solid #00ffcc;
            box-shadow: 0 0 20px #00ffcc;
            transform: scale(1.05);
        }

        .disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Tooltip */
        .tooltip {
            visibility: hidden;
            background: #000;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            white-space: nowrap;
        }

        .disabled:hover .tooltip {
            visibility: visible;
        }

        /* Quantity */
        input[type=number] {
            width: 80px;
            padding: 8px;
            font-size: 16px;
            text-align: center;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        /* Total */
        #total {
            margin-top: 25px;
            font-size: 22px;
            font-weight: bold;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 12px 25px;
            border-radius: 10px;
        }

        /* Button */
        button {
            padding: 14px 35px;
            font-size: 16px;
            margin-top: 25px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background: linear-gradient(45deg, #00ffcc, #00ccff);
            color: black;
            font-weight: bold;
            transition: 0.4s;
        }

            button:hover {
                transform: scale(1.1);
                box-shadow: 0 0 20px #00ffcc;
            }
    </style>
</head>
<body>

    <h2>Select Lithophane Size</h2>

    <!-- SMALL (Selectable) -->
    <div class="card" onclick="selectSize('Small',1500,this)">
        <h3>Small</h3>
        <p>7.5 × 8.5 cm</p>
        <b>LKR 1500</b>
    </div>

    <!-- MEDIUM (Disabled) -->
    <div class="card disabled">
        <span class="tooltip">Coming Soon</span>
        <h3>Medium</h3>
        <p>15 × 15 cm</p>
        <b>LKR 2500</b>
    </div>

    <!-- LARGE (Disabled) -->
    <div class="card disabled">
        <span class="tooltip">Coming Soon</span>
        <h3>Large</h3>
        <p>20 × 20 cm</p>
        <b>LKR 4000</b>
    </div>

    <h3>Quantity</h3>
    <input type="number" id="qty" value="1" min="1" onchange="updateTotal()">

    <h2 id="total">Total: LKR 1500</h2>

    <button onclick="nextStep()">NEXT</button>

    <script>
        let size = "Small";   // default selected
        let price = 1500;

        // Highlight Small card by default
        document.querySelectorAll(".card")[0].classList.add("selected");

        function selectSize(s, p, el) {
            size = s;
            price = p;

            // Remove selection from all cards
            document.querySelectorAll(".card").forEach(c => c.classList.remove("selected"));

            // Add selection only to clicked card
            el.classList.add("selected");

            updateTotal();
        }

        function updateTotal() {
            let qty = document.getElementById("qty").value;
            let total = price * qty;
            document.getElementById("total").innerText = "Total: LKR " + total;
        }

        function nextStep() {
            // Save size and quantity in localStorage
            localStorage.setItem("lithoSize", size);
            localStorage.setItem("lithoQty", document.getElementById("qty").value);

            // Go to upload page
            window.location.href = "upload.htm";
        }
    </script>

</body>
</html>
